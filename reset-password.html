<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>重置密码 / Reset Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #F5F7F5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 48px 32px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .status-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(47, 125, 80, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
        }

        .status-ring svg {
            width: 36px;
            height: 36px;
            color: #2F7D50;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1A1A1A;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 15px;
            color: #616161;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #616161;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1.5px solid #E0E0E0;
            border-radius: 12px;
            background-color: #FAFAFA;
            color: #1A1A1A;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            -webkit-appearance: none;
        }

        .form-group input:focus {
            border-color: #2F7D50;
            box-shadow: 0 0 0 3px rgba(47, 125, 80, 0.1);
            background-color: #FFFFFF;
        }

        .form-group input::placeholder {
            color: #BDBDBD;
        }

        .error-msg {
            display: none;
            font-size: 13px;
            color: #D32F2F;
            margin-top: -12px;
            margin-bottom: 16px;
            text-align: left;
            padding-left: 4px;
        }

        .error-msg.active {
            display: block;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px 24px;
            background-color: #2F7D50;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 16px;
        }

        .btn:hover {
            background-color: #276642;
        }

        .btn:disabled {
            background-color: #2F7D50;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #FFFFFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hint {
            font-size: 13px;
            color: #9E9E9E;
            line-height: 1.5;
        }

        .success-icon {
            display: none;
        }

        .success-icon.active {
            display: flex;
        }

        .lang-switch {
            margin-top: 24px;
            font-size: 13px;
            color: #9E9E9E;
        }

        .lang-switch a {
            color: #2F7D50;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .lang-switch a:hover {
            text-decoration: underline;
        }

        /* 步骤显示控制 */
        .step {
            display: none;
        }

        .step.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 步骤 1：验证中 -->
        <div class="step" id="stepVerify">
            <div class="status-ring">
                <div class="spinner" style="border-color: rgba(47,125,80,0.2); border-top-color: #2F7D50; margin-right: 0;"></div>
            </div>
            <h1 id="verifyTitle"></h1>
            <p class="subtitle" id="verifySubtitle"></p>
        </div>

        <!-- 步骤 2：输入新密码 -->
        <div class="step" id="stepForm">
            <div class="status-ring">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h1 id="formTitle"></h1>
            <p class="subtitle" id="formSubtitle"></p>

            <div class="form-group">
                <label for="newPassword" id="labelNewPassword"></label>
                <input type="password" id="newPassword" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirmPassword" id="labelConfirmPassword"></label>
                <input type="password" id="confirmPassword" autocomplete="new-password">
            </div>

            <p class="error-msg" id="errorMsg"></p>

            <button class="btn" id="submitBtn" onclick="submitPassword()">
                <span id="btnText"></span>
            </button>
        </div>

        <!-- 步骤 3：成功 -->
        <div class="step" id="stepSuccess">
            <div class="status-ring">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h1 id="successTitle"></h1>
            <p class="subtitle" id="successSubtitle"></p>

            <button class="btn" id="openAppBtn" onclick="openApp()">
                <span id="successBtnText"></span>
            </button>

            <p class="hint" id="successHint"></p>
        </div>

        <!-- 步骤 4：失败/链接失效 -->
        <div class="step" id="stepError">
            <div class="status-ring" style="background-color: rgba(211, 47, 47, 0.1);">
                <svg viewBox="0 0 24 24" fill="none" stroke="#D32F2F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
            </div>
            <h1 id="errorTitle"></h1>
            <p class="subtitle" id="errorSubtitle"></p>
        </div>

        <div class="lang-switch">
            <a id="langSwitch" onclick="toggleLang()"></a>
        </div>
    </div>

    <script>
        // Supabase 配置（和 App 保持一致）
        const SUPABASE_URL = 'https://juwawecfkdaitwlxcgrc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1Cxdi8dymVpB04JhCB6Ycw_0yNNt4_x';
        const APP_SCHEME = 'io.supabase.plantrec://';

        const i18n = {
            zh: {
                verifyTitle: '正在验证...',
                verifySubtitle: '请稍候，正在确认您的身份',
                formTitle: '重置密码',
                formSubtitle: '请输入您的新密码',
                labelNewPassword: '新密码',
                labelConfirmPassword: '确认新密码',
                btnSubmit: '确认重置',
                btnSubmitting: '处理中...',
                successTitle: '密码重置成功！',
                successSubtitle: '您可以使用新密码登录了',
                successBtn: '打开 App',
                successHint: '请返回 App 使用新密码登录',
                errorTitle: '链接已失效',
                errorSubtitle: '重置链接已过期或无效，请重新申请',
                errorPasswordShort: '密码长度至少为6位',
                errorPasswordMismatch: '两次输入的密码不一致',
                errorResetFailed: '重置失败，请稍后重试',
                langSwitch: 'English'
            },
            en: {
                verifyTitle: 'Verifying...',
                verifySubtitle: 'Please wait while we confirm your identity',
                formTitle: 'Reset Password',
                formSubtitle: 'Enter your new password',
                labelNewPassword: 'New Password',
                labelConfirmPassword: 'Confirm New Password',
                btnSubmit: 'Confirm Reset',
                btnSubmitting: 'Processing...',
                successTitle: 'Password Reset Successful!',
                successSubtitle: 'You can now log in with your new password',
                successBtn: 'Open App',
                successHint: 'Please return to the app and log in with your new password',
                errorTitle: 'Link Expired',
                errorSubtitle: 'The reset link has expired or is invalid. Please request a new one.',
                errorPasswordShort: 'Password must be at least 6 characters',
                errorPasswordMismatch: 'Passwords do not match',
                errorResetFailed: 'Reset failed. Please try again later.',
                langSwitch: '中文'
            }
        };

        let currentLang = 'zh';
        let supabaseClient = null;

        function detectLang() {
            const lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
            if (lang.startsWith('zh')) {
                return 'zh';
            }
            return 'en';
        }

        function applyLang(lang) {
            currentLang = lang;
            const t = i18n[lang];

            document.getElementById('verifyTitle').textContent = t.verifyTitle;
            document.getElementById('verifySubtitle').textContent = t.verifySubtitle;
            document.getElementById('formTitle').textContent = t.formTitle;
            document.getElementById('formSubtitle').textContent = t.formSubtitle;
            document.getElementById('labelNewPassword').textContent = t.labelNewPassword;
            document.getElementById('labelConfirmPassword').textContent = t.labelConfirmPassword;
            document.getElementById('btnText').textContent = t.btnSubmit;
            document.getElementById('successTitle').textContent = t.successTitle;
            document.getElementById('successSubtitle').textContent = t.successSubtitle;
            document.getElementById('successBtnText').textContent = t.successBtn;
            document.getElementById('successHint').textContent = t.successHint;
            document.getElementById('errorTitle').textContent = t.errorTitle;
            document.getElementById('errorSubtitle').textContent = t.errorSubtitle;
            document.getElementById('langSwitch').textContent = t.langSwitch;
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        }

        function toggleLang() {
            const newLang = currentLang === 'zh' ? 'en' : 'zh';
            applyLang(newLang);
        }

        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('active');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('active');
        }

        function openApp() {
            window.location.href = APP_SCHEME;
        }

        // 解析 URL 参数
        function getUrlParams() {
            const params = {};
            const hash = window.location.hash.substring(1);
            const query = window.location.search.substring(1);

            [hash, query].forEach(part => {
                if (!part) return;
                part.split('&').forEach(pair => {
                    const [key, value] = pair.split('=');
                    if (key) params[decodeURIComponent(key)] = value ? decodeURIComponent(value) : '';
                });
            });

            return params;
        }

        async function initSession() {
            showStep('stepVerify');

            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const params = getUrlParams();

                // 新版 Supabase：使用 code 参数
                if (params.code) {
                    const { data, error } = await supabaseClient.auth.exchangeCodeForSession(params.code);
                    if (error) throw error;
                    showStep('stepForm');
                    return;
                }

                // 旧版 Supabase：使用 access_token
                if (params.access_token) {
                    const { data, error } = await supabaseClient.auth.setSession({
                        access_token: params.access_token,
                        refresh_token: params.refresh_token || ''
                    });
                    if (error) throw error;
                    showStep('stepForm');
                    return;
                }

                // 都没有，说明链接有问题
                throw new Error('No auth params found');
            } catch (err) {
                console.error('Session init failed:', err);
                showStep('stepError');
            }
        }

        async function submitPassword() {
            hideError();

            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const t = i18n[currentLang];

            if (newPassword.length < 6) {
                showError(t.errorPasswordShort);
                return;
            }

            if (newPassword !== confirmPassword) {
                showError(t.errorPasswordMismatch);
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>' + t.btnSubmitting;

            try {
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                showStep('stepSuccess');
            } catch (err) {
                console.error('Password update failed:', err);
                showError(t.errorResetFailed);
                btn.disabled = false;
                btnText.textContent = t.btnSubmit;
            }
        }

        // 回车提交
        document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') submitPassword();
        });

        // 初始化
        applyLang(detectLang());
        initSession();
    </script>
</body>
</html>
